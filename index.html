<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>pets-client</title>
    <script type="module" src="./src/index.ts"></script>
  </head>
  <body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-4xl mx-auto space-y-8">
      <header class="text-center">
        <h1 class="text-4xl font-bold text-indigo-700">Animal Shelter</h1>
        <p class="text-gray-600 mt-2">Manage our furry friends</p>
      </header>

      <!-- Add Animal Form -->
      <section class="bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
          <span class="bg-indigo-100 p-2 rounded-lg">🐾</span>
          Add New Animal
        </h2>
        <form id="animal-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="name" name="name" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
              placeholder="Fluffy">
          </div>
          <div>
            <label for="species" class="block text-sm font-medium text-gray-700 mb-1">Species</label>
            <input type="text" id="species" name="species" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
              placeholder="Dog">
          </div>
          <div>
            <label for="age" class="block text-sm font-medium text-gray-700 mb-1">Age</label>
            <input type="number" id="age" name="age" required min="0"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
              placeholder="2">
          </div>
          <div class="md:col-span-3">
            <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm">
              <span>Add Animal</span>
            </button>
          </div>
        </form>
      </section>

      <!-- Animal List -->
      <section class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
          <h2 class="text-xl font-semibold flex items-center gap-2">
            <span class="bg-green-100 p-2 rounded-lg">🏠</span>
            Shelter Inhabitants
          </h2>
          <span id="animal-count" class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-sm font-medium">0 animals</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-semibold">
              <tr>
                <th class="px-6 py-4">Name</th>
                <th class="px-6 py-4">Species</th>
                <th class="px-6 py-4">Age</th>
                <th class="px-6 py-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="animal-list" class="divide-y divide-gray-100">
              <!-- Animals will be injected here -->
            </tbody>
          </table>
        </div>
        <div id="empty-state" class="hidden p-8 text-center text-gray-500">
          No animals in the shelter yet.
        </div>
      </section>
    </div>

    <!-- Template for Table Row -->
    <template id="animal-row-template">
      <tr class="hover:bg-gray-50 transition-colors">
        <td class="px-6 py-4 font-medium text-gray-900 animal-name"></td>
        <td class="px-6 py-4 text-gray-600 animal-species"></td>
        <td class="px-6 py-4 text-gray-600 animal-age"></td>
        <td class="px-6 py-4 text-right">
          <button class="delete-btn text-red-600 hover:text-red-800 font-medium transition-colors p-2 rounded-lg hover:bg-red-50">
            Delete
          </button>
        </td>
      </tr>
    </template>
  </body>
</html>
